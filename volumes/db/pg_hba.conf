# PostgreSQL Client Authentication Configuration File
# ===================================================
# OAManager: Supabase self-hosted internal service roles

# TYPE  DATABASE        USER                                    ADDRESS                 METHOD

# Local socket connections
local   all             supabase_admin                                                  scram-sha-256
local   all             all                                                             peer map=supabase_map

# Localhost TCP - trust
host    all             all                                     127.0.0.1/32            trust
host    all             all                                     ::1/128                 trust

# Docker internal network - trust for Supabase internal service roles
host    all             supabase_auth_admin                     0.0.0.0/0               trust
host    all             authenticator                           0.0.0.0/0               trust
host    all             supabase_storage_admin                  0.0.0.0/0               trust
host    all             supabase_replication_admin              0.0.0.0/0               trust

# All other connections require password
host    all             all                                     10.0.0.0/8              scram-sha-256
host    all             all                                     172.16.0.0/12           scram-sha-256
host    all             all                                     192.168.0.0/16          scram-sha-256
host    all             all                                     0.0.0.0/0               scram-sha-256

# IPv6
host    all             all                                     ::0/0                   scram-sha-256

<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OAManager">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OAManager</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Tesseract.js OCR (로컬 번들) -->
  <script src="tesseract/tesseract.min.js"></script>
  <script>
    // Flutter에서 호출할 OCR 함수
    async function ocrRecognize(imageBase64) {
      const worker = await Tesseract.createWorker('eng+kor', 1, {
        workerPath: 'tesseract/worker.min.js',
        corePath: 'tesseract/tesseract-core-simd-lstm.wasm.js',
        langPath: 'tesseract',
        gzip: true,
      });
      try {
        const { data: { text } } = await worker.recognize(
          'data:image/png;base64,' + imageBase64
        );
        await worker.terminate();
        return text;
      } catch (e) {
        await worker.terminate();
        throw e;
      }
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter 웹 SPA 라우팅 - 모든 경로를 index.html로 fallback
    location / {
        try_files $uri /index.html;
    }

    # 정적 파일 캐싱 (flutter build/web 산출물)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Source map 파일
    location ~* \.map$ {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # HTML / 서비스워커는 캐시 비활성화 (항상 최신 버전)
    location ~* \.(html|json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # gzip 압축
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/ttf
        font/woff
        font/woff2
        application/wasm;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
